<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Master | What's Cooking?</title>
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/706/706164.png">

    <style>
    
        :root {
            --primary-color: #ff6b6b;
            --text-dark: #2d3436;
            --bg-light: #f8f9fa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-light); 
            color: var(--text-dark);
            line-height: 1.6;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

        
        header { text-align: center; padding: 60px 0 30px; }
        h1 { font-size: 2.8rem; color: var(--text-dark); margin-bottom: 10px; }
        header p { color: #636e72; font-size: 1.1rem; }


        .search-container {
            background: #fff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 40px;
        }

        .form-group { 
            display: flex; 
            gap: 15px; 
            flex-wrap: wrap; }
        
        input[type="text"] {
            flex: 2;
            padding: 15px;
            border: 2px solid #dfe6e9;
            border-radius: 10px;
            font-size: 1rem;
            transition: border 0.3s;
        }

        input[type="text"]:focus { 
            border-color: var(--primary-color); 
            outline: none; }

        select {
            flex: 1;
            padding: 15px;
            border: 2px solid #dfe6e9;
            border-radius: 10px;
            background: #fff;
            cursor: pointer;
        }

        button {
            padding: 15px 30px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        button:hover { background-color: #ee5253; 
            transform: translateY(-2px); }

    
        .recipe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .recipe-card {
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }

        .recipe-card:hover { transform: translateY(-8px); }

        .recipe-card img { width: 100%; 
            height: 220px; 
            object-fit: cover; }

        .card-content { padding: 20px; }

        .card-content h3 { font-size: 1.2rem; 
            margin-bottom: 15px; 
            color: var(--text-dark); }

        .recipe-link {
            display: block;
            text-align: center;
            padding: 12px;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .recipe-link:hover { 
            background: var(--primary-color); 
            color: #fff; }

        
        @media (max-width: 600px) { .form-group { flex-direction: column; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🍳 Meal Master</h1>
        <p>Your ingredients, our inspiration.</p>
    </header>

    <div class="search-container">
        <form method="POST" class="form-group">
            <input type="text" name="ingredients" placeholder="What ingredients do you have?" value="{{ query }}" required>
            
            <select name="cuisine">
                <option value="">Any Cuisine</option>
                <option value="Italian">Italian</option>
                <option value="Japanese">Japanese</option>
                <option value="Indian">Indian</option>
                <option value="Mexican">Mexican</option>
                <option value="French">French</option>
            </select>
            
            <button type="submit">Find Dishes</button>
        </form>
    </div>

    <div class="recipe-grid">
        {% for r in recipes %}
        <div class="recipe-card">
            <img src="{{ r.image }}" alt="{{ r.title }}">
            <div class="card-content">
                <h3>{{ r.title }}</h3>
                <a href="{{ r.sourceUrl }}" target="_blank" class="recipe-link">See Recipe</a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
